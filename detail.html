<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品詳情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
</head>
<body class="bg-gray-100">

    <!-- 導航列 -->
    <nav class="bg-black text-white p-5 sticky top-0 z-50">
        <div class="container mx-auto flex justify-end items-center">
            <ul class="flex space-x-8 text-sm uppercase font-light">
                <li class="relative">
                    <button onclick="toggleMenu()" class="hover:text-gray-400">Products</button>
                    <div id="dropdown-menu" class="absolute right-0 mt-2 w-48 bg-white text-black shadow-xl hidden p-2 z-50"></div>
                </li>
                <li class="text-gray-600 cursor-not-allowed">Story</li>
                <li class="text-gray-600 cursor-not-allowed">Artists</li>
                <li class="text-gray-600 cursor-not-allowed">Contact</li>
            </ul>
        </div>
    </nav>

    <!-- 中間品牌區塊 -->
    <div id="brand-header" class="flex flex-col items-center justify-center py-3 bg-white shadow-sm border-b border-gray-100 px-4">
        <div id="brand-logo-container" class="w-[85%] md:w-[45%] max-w-[650px] flex justify-center mb-0">
            <img id="brand-image" src="logo.png" alt="Akashura Guitars" class="w-full h-auto object-contain">
        </div>
        <h1 id="brand-title" class="text-4xl md:text-5xl font-extrabold tracking-widest text-black uppercase hidden">Akashura Guitars</h1>
        <p id="brand-slogan" class="text-xs md:text-sm text-gray-500 font-light tracking-widest uppercase text-center mt-0 tracking-[0.26em] md:tracking-[0.43em] whitespace-nowrap">Crafting Personality.</p>
    </div>

    <div class="p-10">
        <div id="detail-view" class="max-w-6xl mx-auto bg-white p-8 rounded shadow">
            <p>Loading details...</p>
        </div>
    </div>

    <script>
        const client = contentful.createClient({
            space: 'w2up5vfofaou',
            accessToken: 'z3G9FnnQMyBbrnk1VaOzrvqST7WlTnnEs703R8G-tdQ'
        });

        const dropdown = document.getElementById('dropdown-menu');
        function toggleMenu() { dropdown.classList.toggle('hidden'); }

        async function syncNav() {
            try {
                const catData = await client.getEntries({ content_type: 'category' });
                dropdown.innerHTML = catData.items.map(cat => `
                    <a href="/?cat=${cat.sys.id}" class="block px-4 py-2 hover:bg-gray-100">${cat.fields.name || 'Untitled'}</a>
                `).join('');
                
                // 動態載入品牌設定 (Logo + Slogan)
                const siteData = await client.getEntries({ content_type: 'siteSettings', include: 1 });
                if (siteData.items.length > 0) {
                    const fields = siteData.items[0].fields;
                    if (fields.brandName) {
                        document.getElementById('brand-image').src = 'https:' + fields.brandName.fields.file.url;
                    }
                    if (fields.slogan) {
                        document.getElementById('brand-slogan').textContent = fields.slogan;
                    }
                }
            } catch (err) { console.error(err); }
        }
        syncNav();

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        async function fetchDetail() {
            try {
                const entry = await client.getEntry(productId);
                const fields = entry.fields;
                let imageHtml = fields.image?.map(img => `<img src="https:${img.fields.file.url}" class="w-full h-auto max-h-[600px] object-contain rounded mb-4">`).join('') || '';

                document.getElementById('detail-view').innerHTML = `
                    ${imageHtml}
                    <h1 class="text-4xl font-bold mb-4">${fields.title}</h1>
                    <p class="text-gray-700 whitespace-pre-line leading-relaxed text-lg">${fields.description || 'No description available.'}</p>
                    <a href="/" class="inline-block mt-8 px-6 py-2 bg-black text-white rounded hover:bg-gray-800 transition">Back to Products</a>
                `;
            } catch (err) {
                document.getElementById('detail-view').innerHTML = '<p class="text-red-500">Error loading product details.</p>';
            }
        }
        fetchDetail();
    </script>
</body>
</html>
