<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品詳情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
</head>
<body class="bg-gray-100">
    <!-- 導航列與首頁完全同步 -->
    <nav class="bg-black text-white p-5 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center">
                <a href="/">
                    <img src="logo.png" alt="Akashura Logo" class="h-[24px] w-auto object-contain">
                </a>
            </div>
            <ul class="flex space-x-8 text-sm uppercase font-light">
                <li class="relative">
                    <button onclick="toggleMenu()" class="hover:text-gray-400">STORY</button>
                    <!-- Story 下拉選單 -->
                    <div id="story-menu" class="absolute right-0 mt-2 w-48 bg-white text-black shadow-xl hidden p-2 z-50">
                        <a href="#" class="block px-4 py-2 hover:bg-gray-100">Our Heritage</a>
                    </div>
                </li>
                <li class="relative">
                    <button onclick="toggleMenu()" class="hover:text-gray-400">Products</button>
                    <!-- Products 下拉選單 -->
                    <div id="dropdown-menu" class="absolute right-0 mt-2 w-48 bg-white text-black shadow-xl hidden p-2 z-50">
                        <!-- 這裡應與首頁邏輯保持一致 -->
                    </div>
                </li>
                <li class="text-gray-600 cursor-not-allowed">Artists</li>
                <li class="text-gray-600 cursor-not-allowed">Contact</li>
            </ul>
        </div>
    </nav>

    <div class="p-10">
        <div id="detail-view" class="max-w-6xl mx-auto bg-white p-8 rounded shadow">
            <p>Loading details...</p>
        </div>
    </div>

    <script>
    function toggleMenu() {
        document.getElementById('dropdown-menu')?.classList.toggle('hidden');
        document.getElementById('story-menu')?.classList.toggle('hidden');
    }
    const client = contentful.createClient({
            space: 'w2up5vfofaou',
            accessToken: 'z3G9FnnQMyBbrnk1VaOzrvqST7WlTnnEs703R8G-tdQ'
        });

        // 重新同步首頁的 dropdown 載入邏輯
        async function syncNav() {
            try {
                const catData = await client.getEntries({ content_type: 'category' });
                document.getElementById('dropdown-menu').innerHTML = catData.items.map(cat => `
                    <a href="/?cat=${cat.sys.id}" class="block px-4 py-2 hover:bg-gray-100">${cat.fields.name || 'Untitled'}</a>
                `).join('');
            } catch (err) { console.error(err); }
        }
        syncNav();

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        async function fetchDetail() {
            try {
                const entry = await client.getEntry(productId);
                const fields = entry.fields;
                
                let imageHtml = '';
                if (fields.image && fields.image.length > 0) {
                    fields.image.forEach(img => {
                        const url = 'https:' + img.fields.file.url;
                        imageHtml += `<img src="${url}" class="w-full h-auto max-h-[600px] object-contain rounded mb-4">`;
                    });
                }

                document.getElementById('detail-view').innerHTML = `
                    ${imageHtml}
                    <h1 class="text-4xl font-bold mb-4">${fields.title}</h1>
                    <p class="text-gray-700 whitespace-pre-line leading-relaxed text-lg">${fields.description || 'No description available.'}</p>
                    <a href="/" class="inline-block mt-8 px-6 py-2 bg-black text-white rounded hover:bg-gray-800 transition">Back to Products</a>
                `;
            } catch (err) {
                document.getElementById('detail-view').innerHTML = '<p class="text-red-500">Error loading product details.</p>';
            }
        }
        fetchDetail();
    </script>
</body>
</html>
