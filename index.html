<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akashura Guitars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
</head>
<body class="bg-gray-100">
    
    <!-- 導航列 -->
    <nav class="bg-black text-white p-5 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center">
                <img id="brand-logo" src="logo.png" alt="Akashura Logo" class="h-[24px] w-auto object-contain">
            </div>
            
            <ul class="flex space-x-8 text-sm uppercase font-light">
                <li class="relative">
                    <a href="#" onclick="toggleDropdown()" class="hover:text-gray-400 cursor-pointer">Products</a>
                    <!-- 下拉選單：預設隱藏，由 toggleDropdown 控制 -->
                    <div id="dropdown-menu" class="absolute left-0 top-full pt-2 w-[400px] bg-white text-black shadow-xl hidden z-50">
                        <div id="categories-container" class="flex flex-row p-4 gap-4">
                            <!-- JS 會在這裡並列放入分類與其系列 -->
                        </div>
                    </div>
                </li>
                <li class="h-full flex items-center text-gray-600 cursor-not-allowed">Story</li>
                <li class="h-full flex items-center text-gray-600 cursor-not-allowed">Artists</li>
                <li class="h-full flex items-center text-gray-600 cursor-not-allowed">Contact</li>
            </ul>
        </div>
    </nav>

    <div class="text-center py-6 bg-white">
        <h1 class="text-3xl font-bold tracking-widest text-black">Akashura Guitars</h1>
        <p class="text-base text-gray-500 mt-1 font-light tracking-widest uppercase">Crafting Personality.</p>
    </div>

    <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 gap-8 p-10 container mx-auto">
        <p class="text-center col-span-3 text-gray-500">Loading products...</p>
    </div>

    <script>
        const client = contentful.createClient({
            space: 'w2up5vfofaou',
            accessToken: 'z3G9FnnQMyBbrnk1VaOzrvqST7WlTnnEs703R8G-tdQ'
        });

        // 切換選單顯示
        function toggleDropdown() {
            document.getElementById('dropdown-menu').classList.toggle('hidden');
        }

        async function loadNav() {
            try {
                const categories = await client.getEntries({ content_type: 'category' });
                const series = await client.getEntries({ content_type: 'series', include: 1 });
                const container = document.getElementById('categories-container');
                container.innerHTML = '';
                
                const seenCategories = new Set();
                
                categories.items.forEach(cat => {
                    const catName = cat.fields.electricGuitars || 'Untitled Category';
                    if (seenCategories.has(catName)) return;
                    seenCategories.add(catName);
                    
                    const subSeries = series.items.filter(s => s.fields.category?.sys.id === cat.sys.id);
                    
                    let seriesHtml = subSeries.map(s => 
                        `<a href="#" onclick="filterBySeries('${s.sys.id}'); toggleDropdown();" class="block py-1 hover:text-blue-600 text-xs">${s.fields.series || 'Untitled Series'}</a>`
                    ).join('');

                    // 並列結構：每個分類是一個區塊
                    container.innerHTML += `
                        <div class="flex-1">
                            <div class="font-bold text-sm border-b pb-1 mb-2">${catName}</div>
                            ${seriesHtml}
                        </div>
                    `;
                });
            } catch (err) { console.error("選單載入失敗:", err); }
        }

        async function filterBySeries(seriesId) {
            const entry = await client.getEntry(seriesId);
            // 處理 subProjectAssociation，確保將其轉換為陣列以便後續渲染
            let products = entry.fields.subProjectAssociation;
            if (products && !Array.isArray(products)) products = [products];
            
            const container = document.getElementById('product-list');
            container.innerHTML = '';

            if (!products || products.length === 0) {
                container.innerHTML = '<p class="col-span-3 text-center">No products in this series.</p>';
                return;
            }

            products.forEach(item => {
                const fields = item.fields;
                const imageUrl = fields.image ? 'https:' + fields.image[0].fields.file.url : 'https://via.placeholder.com/300';
                container.innerHTML += `
                    <a href="detail.html?id=${item.sys.id}" class="bg-white p-6 shadow-lg rounded-xl hover:scale-105 transition-transform duration-300 block">
                        <img src="${imageUrl}" class="w-full h-64 object-cover rounded-lg mb-4">
                        <h2 class="text-2xl font-bold text-gray-800">${fields.title || 'Untitled'}</h2>
                    </a>
                `;
            });
        }

        loadNav();
        // 初始載入所有產品
        async function fetchProducts() {
            const response = await client.getEntries({ content_type: 'guitar', include: 10 });
            const container = document.getElementById('product-list');
            container.innerHTML = '';
            response.items.forEach(item => {
                const fields = item.fields;
                const imageUrl = fields.image ? 'https:' + fields.image[0].fields.file.url : 'https://via.placeholder.com/300';
                container.innerHTML += `
                    <a href="detail.html?id=${item.sys.id}" class="bg-white p-6 shadow-lg rounded-xl hover:scale-105 transition-transform duration-300 block">
                        <img src="${imageUrl}" class="w-full h-64 object-cover rounded-lg mb-4">
                        <h2 class="text-2xl font-bold text-gray-800">${fields.title || 'Untitled'}</h2>
                    </a>
                `;
            });
        }
        fetchProducts();
    </script>
</body>
</html>
