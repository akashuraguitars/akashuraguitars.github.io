<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akashura Guitars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
</head>
<body class="bg-gray-100">

    <!-- 導航列 -->
    <nav class="bg-black text-white p-5 sticky top-0 z-50">
        <div class="container mx-auto flex justify-end items-center">
            <ul class="flex space-x-8 text-sm uppercase font-light">
                <li class="relative">
                    <button onclick="toggleMenu()" class="hover:text-gray-400">Products</button>
                    <div id="dropdown-menu" class="absolute right-0 mt-2 w-48 bg-white text-black shadow-xl hidden p-2 z-50"></div>
                </li>
                <li class="text-gray-600 cursor-not-allowed">Story</li>
                <li class="text-gray-600 cursor-not-allowed">Artists</li>
                <li class="text-gray-600 cursor-not-allowed">Contact</li>
            </ul>
        </div>
    </nav>

    <!-- 中間品牌區塊 (留白空間大幅縮減，讓橫欄高度變扁、更精緻) -->
    <div id="brand-header" class="flex flex-col items-center justify-center py-3 bg-white shadow-sm border-b border-gray-100 px-4">
        <!-- 品牌圖片容器：恢復原本的放大尺寸 -->
        <div id="brand-logo-container" class="w-[70%] md:w-[35%] max-w-[500px] flex justify-center mb-1">
            <img id="brand-image" src="logo.png" alt="Akashura Guitars" class="w-full h-auto object-contain">
        </div>
        <!-- 備用文字標題：僅在沒設定圖片時顯示，設定為 hidden -->
        <h1 id="brand-title" class="text-4xl md:text-5xl font-extrabold tracking-widest text-black uppercase hidden">Akashura Guitars</h1>
        <p id="brand-slogan" class="text-xs md:text-sm text-gray-500 font-light tracking-widest uppercase text-center mt-1">Crafting Personality.</p>
    </div>

    <!-- 形象大圖 -->
    <div id="hero-section" class="w-full h-[500px] overflow-hidden">
        <img src="https://images.ctfassets.net/w2up5vfofaou/6IlEBCrhlT4XPvzgjbZhOa/c9410775bd83e355229c485b01abfb1a/Gemini_Generated_Image_yte.png" class="w-full h-full object-cover" alt="Hero Image">
    </div>

    <div id="content-view" class="container mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 p-10">
        <p class="text-center col-span-3 text-gray-500">Loading...</p>
    </div>

    <script>
        const client = contentful.createClient({
            space: 'w2up5vfofaou',
            accessToken: 'z3G9FnnQMyBbrnk1VaOzrvqST7WlTnnEs703R8G-tdQ'
        });

        const view = document.getElementById('content-view');
        const dropdown = document.getElementById('dropdown-menu');
        const hero = document.getElementById('hero-section');
        const brandImage = document.getElementById('brand-image');
        const brandTitle = document.getElementById('brand-title');
        const brandSlogan = document.getElementById('brand-slogan');
        const logoContainer = document.getElementById('brand-logo-container');

        function toggleMenu() { dropdown.classList.toggle('hidden'); }

        function getImageUrl(fields) {
            const img = fields.image || fields.seriesImage || fields.subseriesImage;
            if (Array.isArray(img)) return img[0]?.fields?.file ? 'https:' + img[0].fields.file.url : null;
            return img?.fields?.file ? 'https:' + img.fields.file.url : 'https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=300&q=80';
        }

        // 初始化選單與大圖，並動態抓取品牌標牌資訊
        async function initNav() {
            try {
                // 1. 抓取分類
                const catData = await client.getEntries({ content_type: 'category' });
                dropdown.innerHTML = catData.items.map(cat => `
                    <button onclick="renderSeries('${cat.sys.id}'); toggleMenu();" class="block w-full text-left px-4 py-2 hover:bg-gray-100">${cat.fields.name || 'Untitled'}</button>
                `).join('');
                view.innerHTML = '<p class="text-center col-span-3">請選擇類別</p>';

                // 2. 抓取大圖與站點設定 (包含動態品牌標牌)
                const siteData = await client.getEntries({ content_type: 'siteSettings', include: 1 });
                if (siteData.items.length > 0) {
                    const fields = siteData.items[0].fields;
                    // 更新大圖
                    if (fields.heroImage) {
                        hero.querySelector('img').src = 'https:' + fields.heroImage.fields.file.url;
                    }
                    
                    // 動態品牌名稱圖片邏輯
                    if (fields.brandName) {
                        // 如果 brandName 有綁定圖片，取得 URL 並更換圖片
                        const logoUrl = fields.brandName.fields?.file?.url 
                            ? 'https:' + fields.brandName.fields.file.url 
                            : 'logo.png';
                        brandImage.src = logoUrl;
                        logoContainer.classList.remove('hidden');
                        brandTitle.classList.add('hidden');
                    } else {
                        // 如果沒有設定圖片，則退回顯示大字體標題
                        logoContainer.classList.add('hidden');
                        brandTitle.classList.remove('hidden');
                    }
                    
                    // 更新 Slogan 文字
                    if (fields.slogan) {
                        brandSlogan.textContent = fields.slogan;
                    }
                }
            } catch (err) { console.error(err); }
        }

        async function renderSeries(catId) {
            hero.classList.add('hidden');
            try {
                const data = await client.getEntries({ content_type: 'series' });
                const filtered = data.items.filter(s => s.fields.category?.sys?.id === catId);
                view.innerHTML = filtered.map(s => `
                    <div onclick="renderSubSeries('${s.sys.id}')" class="bg-white p-6 shadow-lg cursor-pointer hover:scale-105 transition rounded-xl text-center">
                        <img src="${getImageUrl(s.fields)}" class="w-full h-48 object-cover mb-4 rounded-lg">
                        <h2 class="text-xl font-bold">${s.fields.series || 'Untitled Series'}</h2>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function renderSubSeries(seriesId) {
            try {
                const data = await client.getEntries({ content_type: 'subseries' });
                const filtered = data.items.filter(ss => {
                    const sId = Array.isArray(ss.fields.series) ? ss.fields.series[0]?.sys?.id : ss.fields.series?.sys?.id;
                    return sId === seriesId;
                });
                view.innerHTML = filtered.map(ss => `
                    <div onclick="renderProducts('${ss.sys.id}')" class="bg-white p-6 shadow-lg cursor-pointer hover:scale-105 transition rounded-xl text-center">
                        <img src="${getImageUrl(ss.fields)}" class="w-full h-48 object-cover mb-4 rounded-lg">
                        <h2 class="text-xl font-bold">${ss.fields.subseriesName || 'Untitled'}</h2>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function renderProducts(subSeriesId) {
            try {
                const data = await client.getEntries({ content_type: 'guitar' });
                const filtered = data.items.filter(g => {
                    const subId = Array.isArray(g.fields.subseries) ? g.fields.subseries[0]?.sys?.id : g.fields.subseries?.sys?.id;
                    return subId === subSeriesId;
                });
                if (filtered.length === 0) { view.innerHTML = '<p class="col-span-3 text-center">No products found.</p>'; return; }
                view.innerHTML = filtered.map(g => `
                    <a href="detail.html?id=${g.sys.id}" class="bg-white p-6 shadow-lg rounded-xl hover:scale-105 transition block">
                        <img src="${getImageUrl(g.fields)}" class="w-full h-64 object-cover mb-4 rounded-lg">
                        <h2 class="font-bold text-lg">${g.fields.title || 'Untitled'}</h2>
                    </a>
                `).join('');
            } catch (err) { console.error(err); }
        }

        initNav();
    </script>
</body>
</html>
